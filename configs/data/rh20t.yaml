# SPDX-License-Identifier: MIT
# RH20T source config — Phase 2 deliverable.
# See docs/IMPLEMENTATION_PLAN.md §5 and §11.15 (RH20T).

source: rh20t
repo_id: "<org>/usam-rh20t"
embodiment: rh20t_franka
fps_native: 10            # canonical action stream fps (we re-sync video to it)
fps_features: 5
fps_action: 10

download:
  # RH20T ships per-config tarballs at https://rh20t.github.io
  # We assume the tarballs are mirrored locally before stage_2a runs.
  raw_root: "/scratch/usam/rh20t/raw"
  configs:
    - RH20T_cfg1
    - RH20T_cfg2
    - RH20T_cfg3
    - RH20T_cfg4
    - RH20T_cfg5
    - RH20T_cfg6
    - RH20T_cfg7

convert:
  cameras:
    - head_rgb
    - wrist_rgb
  action_dim_native: 7    # [x, y, z, rx, ry, rz, gripper]
  action_dim_padded: 32
  state_dim_padded: 50
  # RH20T mp4 frames are at 30 Hz; we sub-sample to 10 Hz to match the action
  # json. The converter uses nearest-timestamp matching — see
  # prep/stage_2a_to_lerobot/rh20t.py:_select_nearest_indices.
  video_fps: 30
  preserve_force_torque: true

flow:
  target_hw: [378, 378]
  iters: 12
  fp16: true

depth:
  path: dav2
  target_hw: [192, 192]
  max_range_mm: 5000
  fp16: true
  low_quality: true

dino_cache:
  target_hw: [378, 378]
  n_keep_tokens: 64
  cache_fps: 5
  fp16: true

mixture_weight: 0.20

camera_map_path: "configs/data/camera_maps/rh20t.yaml"
