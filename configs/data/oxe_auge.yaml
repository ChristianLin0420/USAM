# SPDX-License-Identifier: MIT
# OXE-AugE source config — Phase 2 deliverable.
# See docs/IMPLEMENTATION_PLAN.md §5 and §11.15 (OXE-AugE).
#
# OXE-AugE is a meta-collection. We process one sub-source per chunk via
# OxeAugeConverter(sub_source=...). Per-sub-source quirks live in
# the manifest below (action format, fps, ego-camera availability).

source: oxe_auge
repo_id: "<org>/usam-oxe-auge"
embodiment: oxe_auge_generic
fps_native: variable
fps_features: 5
fps_action: variable

download:
  rlds_data_dir: "gs://gresearch/robotics"

convert:
  cameras:
    - head_rgb
    - wrist_rgb       # not all sub-sources have this; converter degrades cleanly
  action_dim_native: 32
  action_dim_padded: 32
  state_dim_padded: 50
  # The first 7 padded columns of `action_native` always hold the canonical
  # EE-velocity stream (lin x3, ang x3, gripper). The converter's
  # _action_to_canonical_velocity dispatches on per-sub-source action_format.
  prefilled_canonical_columns: 7

flow:
  target_hw: [378, 378]
  iters: 12
  fp16: true

depth:
  path: dav2
  target_hw: [192, 192]
  max_range_mm: 5000
  fp16: true
  low_quality: true

dino_cache:
  target_hw: [378, 378]
  n_keep_tokens: 64
  cache_fps: 5
  fp16: true

mixture_weight: 0.10

# Per-sub-source manifest. Keys must match TFDS dataset names. Drop any
# entry whose has_ego_camera is false — the converter will refuse to
# instantiate for those.
manifest:
  fractal20220817_data:
    action_format: ee_velocity
    fps: 3
    has_ego_camera: true
    camera_map: { image: head_rgb }
  kuka:
    action_format: ee_pose
    fps: 10
    has_ego_camera: true
    camera_map: { image: head_rgb }
  taco_play:
    action_format: ee_velocity
    fps: 15
    has_ego_camera: true
    camera_map: { rgb_static: head_rgb, rgb_gripper: wrist_rgb }
  jaco_play:
    action_format: ee_velocity
    fps: 10
    has_ego_camera: true
    camera_map: { image: head_rgb }
  berkeley_cable_routing:
    action_format: ee_velocity
    fps: 10
    has_ego_camera: true
    camera_map: { image: head_rgb }

camera_map_path: "configs/data/camera_maps/oxe_auge.yaml"
